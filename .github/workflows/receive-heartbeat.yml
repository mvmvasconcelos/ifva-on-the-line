name: Recebe Heartbeat

on:
  repository_dispatch:
    types: [heartbeat]

jobs:
  update-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Importante: permite que o workflow faça push das alterações

    steps:
      - name: Fazer checkout do repositório
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Processar heartbeat e detectar quedas
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/scripts
          python scripts/process_heartbeat.py

      - name: Comitar e enviar alterações
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/status.json
          
          # Apenas fazer commit se houver alterações
          if git diff --staged --quiet; then
            echo "Nenhuma alteração para comitar"
          else
            git commit -m "update: heartbeat recebido!"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break || sleep 2
            done
          fi
