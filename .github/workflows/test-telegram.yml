name: Testar Notificação do Telegram

on:
  workflow_dispatch: # Apenas acionamento manual

permissions:
  contents: read

jobs:
  enviar-teste:
    runs-on: ubuntu-latest
    
    steps:
      - name: Fazer checkout do repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Enviar mensagem de teste para o Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python -c "
          import json
          import urllib.request
          import urllib.parse
          import datetime
          import os

          bot_token = os.environ.get('TELEGRAM_BOT_TOKEN')
          
          if not bot_token:
              print('❌ TELEGRAM_BOT_TOKEN não configurado')
              exit(1)

          # Ler configuração do status.json
          with open('data/status.json', 'r') as f:
              data = json.load(f)
          
          telegram_config = data.get('config', {}).get('telegram', {})
          
          if not telegram_config.get('enabled', False):
              print('❌ Telegram está desativado na configuração do status.json')
              exit(1)
          
          chat_ids = telegram_config.get('chat_ids', [])
          
          if not chat_ids:
              print('❌ Nenhum chat_ids configurado no status.json')
              exit(1)

          # Obter hora atual em Brasília
          now = datetime.datetime.now(datetime.timezone.utc)
          brasilia_tz = datetime.timezone(datetime.timedelta(hours=-3))
          now_brasilia = now.astimezone(brasilia_tz)
          
          # Preparar mensagem de teste
          message = (
              f'✅ *Teste de Notificação*\n\n'
              f'🤖 *Bot:* IFVA On The Line\n'
              f'🏫 *Sistema:* IFSul Venâncio Aires\n'
              f'⏰ *Horário:* {now_brasilia.strftime(\"%d/%m/%Y às %H:%M:%S\")}\n'
              f'🌎 *Timezone:* Horário de Brasília (UTC-3)\n\n'
              f'Se você recebeu esta mensagem, o sistema de alertas via Telegram está funcionando corretamente! 🎉'
          )
          
          base_url = f'https://api.telegram.org/bot{bot_token}/sendMessage'
          
          success_count = 0
          for chat_id in chat_ids:
              try:
                  params = {
                      'chat_id': chat_id,
                      'text': message,
                      'parse_mode': 'Markdown'
                  }
                  
                  data_encoded = urllib.parse.urlencode(params).encode('utf-8')
                  req = urllib.request.Request(base_url, data=data_encoded)
                  
                  with urllib.request.urlopen(req) as response:
                      result = json.loads(response.read().decode('utf-8'))
                      if result.get('ok'):
                          print(f'✅ Telegram enviado com sucesso para chat_id: {chat_id}')
                          success_count += 1
                      else:
                          print(f'❌ Erro no Telegram para {chat_id}: {result}')
              except Exception as e:
                  print(f'❌ Erro ao enviar para {chat_id}: {e}')
          
          if success_count > 0:
              print(f'\n✅ Teste concluído! {success_count}/{len(chat_ids)} mensagens enviadas com sucesso.')
          else:
              print(f'\n❌ Teste falhou! Nenhuma mensagem foi enviada.')
              exit(1)
          "
